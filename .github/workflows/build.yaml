name: Build

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - '*.md'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - '*.md'

concurrency:
  # Only run once for latest commit per ref and cancel other (previous) runs.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: 1.26.0

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest #x64
          - ubuntu-24.04-arm #arm64
          - windows-latest #x64
          # - macos-13 #x64
          - macos-latest #arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: |
          build_date="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "BUILD_DATE=$build_date" >> "$GITHUB_ENV"
          make build BUILD_DATE="$build_date"
      - name: Verify version output
        run: |
          binary=./rancher-mcp-server
          if [[ -f ./rancher-mcp-server.exe ]]; then
            binary=./rancher-mcp-server.exe
          fi
          ./scripts/verify-version-output.sh "$binary" "$(git describe --tags --always --dirty)" "$(git rev-parse HEAD)" "$BUILD_DATE"
      - name: Test
        run: go test ./...
