name: Release Docker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: false
          go-version: "1.26.0"
      - name: Set build date
        run: echo "BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Preflight GoReleaser build
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2.12"
          args: build --clean --single-target
        env:
          BUILD_DATE: ${{ env.BUILD_DATE }}
      - name: Verify GoReleaser version output
        run: |
          # Keep in sync with `.goreleaser.yml` `dist: releases`.
          binary_path="$(find releases -type f -name 'rancher-mcp-server*' -perm -111 | head -n 1)"
          test -n "$binary_path"
          ./scripts/verify-version-output.sh "$binary_path" "$(git describe --tags --exact-match HEAD)" "$(git rev-parse HEAD)" "$BUILD_DATE"
      - name: Verify release image version output
        run: |
          # Keep in sync with `.goreleaser.yml` `dist: releases`.
          binary_path="$(find releases -type f -name 'rancher-mcp-server*' -perm -111 | head -n 1)"
          test -n "$binary_path"
          stage_dir="$(mktemp -d)"
          trap 'rm -rf "$stage_dir"' EXIT
          cp Dockerfile "$stage_dir/Dockerfile"
          cp "$binary_path" "$stage_dir/rancher-mcp-server"
          chmod +x "$stage_dir/rancher-mcp-server"
          docker build --target=goreleaser-release -t rancher-mcp-server-version-preflight "$stage_dir"
          ./scripts/verify-version-container-output.sh rancher-mcp-server-version-preflight "$(git describe --tags --exact-match HEAD)" "$(git rev-parse HEAD)" "$BUILD_DATE"
          docker rmi rancher-mcp-server-version-preflight
      - name: Verify direct local Docker build path
        run: |
          docker build \
            --build-arg VERSION="$(git describe --tags --exact-match HEAD)" \
            --build-arg GIT_COMMIT="$(git rev-parse HEAD)" \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            -t rancher-mcp-server-local-preflight .
          ./scripts/verify-version-container-output.sh rancher-mcp-server-local-preflight "$(git describe --tags --exact-match HEAD)" "$(git rev-parse HEAD)" "$BUILD_DATE"
          docker rmi rancher-mcp-server-local-preflight
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2.12"
          args: release --clean
        env:
          BUILD_DATE: ${{ env.BUILD_DATE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
